---
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            cc: gcc
            asset_name: portwho-linux-amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            cc: gcc
            asset_name: portwho-linux-arm64
          - runner: macos-13
            os: macos
            arch: amd64
            cc: clang
            asset_name: portwho-macos-amd64
          - runner: macos-14
            os: macos
            arch: arm64
            cc: clang
            asset_name: portwho-macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build binary
        run: |
          ${{ matrix.cc }} -O2 -Wall -Wextra -o portwho portwho.c
          ./portwho --help

      - name: Package binary
        run: |
          mkdir -p dist
          cp portwho "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"
          shasum -a 256 "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
